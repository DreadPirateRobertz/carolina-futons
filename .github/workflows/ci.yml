name: CI

# Triggers: push/PR to main, plus nightly integration run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC (full integration suite)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Unit Tests ───────────────────────────────────────────────────────────────
  # Runs Vitest across Node 18 + 20 matrix. On Node 20: also collects coverage,
  # posts a summary comment to the PR, and uploads to Codecov.
  # Coverage thresholds: lines 70%, branches 60%, functions 70%.
  # Secret required: CODECOV_TOKEN (optional — fail_ci_if_error: false)
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 20
        run: npx vitest run --coverage || true  # || true: coverage failures don't block CI

      - name: Upload coverage to Codecov
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Post coverage comment on PR
        # Reads coverage/coverage-summary.json, builds a markdown table,
        # then finds-and-updates any existing coverage comment (idempotent)
        # or creates a new one. Skips silently if no summary file exists.
        if: github.event_name == 'pull_request' && matrix.node-version == 20
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            } catch (e) {
              console.log('No coverage summary found, skipping comment.');
              return;
            }

            // Minimum acceptable coverage per metric (aligned with vitest config)
            const thresholds = { lines: 70, branches: 60, functions: 70 };
            const { total } = summary;
            const metrics = [
              { name: 'Lines', pct: total.lines.pct, threshold: thresholds.lines },
              { name: 'Branches', pct: total.branches.pct, threshold: thresholds.branches },
              { name: 'Functions', pct: total.functions.pct, threshold: thresholds.functions },
              { name: 'Statements', pct: total.statements.pct, threshold: null },
            ];

            const failures = metrics.filter(m => m.threshold != null && m.pct < m.threshold);
            const icon = failures.length > 0 ? ':x:' : ':white_check_mark:';

            let body = `## ${icon} Coverage Report\n\n`;
            body += '| Metric | Coverage | Threshold | Status |\n';
            body += '|--------|----------|-----------|--------|\n';

            for (const m of metrics) {
              if (m.threshold != null) {
                const pass = m.pct >= m.threshold;
                const status = pass ? ':white_check_mark:' : ':x: Below threshold';
                body += `| ${m.name} | ${m.pct}% | ${m.threshold}% | ${status} |\n`;
              } else {
                body += `| ${m.name} | ${m.pct}% | — | — |\n`;
              }
            }

            if (failures.length > 0) {
              body += `\n> **${failures.length} metric(s) below threshold.** Please improve coverage before merging.\n`;
            }

            // Find and update existing comment or create new one
            const marker = '## :white_check_mark: Coverage Report';
            const markerFail = '## :x: Coverage Report';
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.body.startsWith(marker) || c.body.startsWith(markerFail)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # ── Lint ─────────────────────────────────────────────────────────────────────
  # ESLint on Node 20. Runs in parallel with test job. Fails fast on lint errors.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Lint
        run: npm run lint

  # ── Nightly Integration ──────────────────────────────────────────────────────
  # Full test suite with verbose + JUnit output. On failure: auto-opens a GitHub
  # issue tagged [bug, ci-nightly] with the first 30 failed test lines + run URL.
  # Uploads test-results/ artifact (retained 30 days). Coverage sent to Codecov
  # with flag=nightly. Requires: CODECOV_TOKEN secret, issues: write permission.
  nightly-integration:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run full integration test suite
        id: integration
        run: |
          mkdir -p test-results
          npx vitest run --reporter=verbose --reporter=junit \
            --outputFile.junit=test-results/junit.xml 2>&1 | tee test-results/full-output.txt
        continue-on-error: true

      - name: Generate coverage report
        if: always()
        run: |
          npx vitest run --coverage --reporter=json \
            --outputFile=test-results/coverage.json || true

      - name: Upload nightly coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: nightly
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: test-results/
          retention-days: 30

      - name: Check for failures and create issue
        if: steps.integration.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('test-results/full-output.txt', 'utf8');
            } catch (e) {
              output = 'Could not read test output.';
            }

            const failedLines = output.split('\n')
              .filter(l => l.includes('FAIL') || l.includes('×'))
              .slice(0, 30)
              .join('\n');

            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              'actions/runs',
              process.env.GITHUB_RUN_ID,
            ].join('/');

            const today = new Date().toISOString().split('T')[0];

            const body = [
              '## Nightly Integration Test Failure',
              '',
              '**Date:** ' + today,
              '**Run:** ' + runUrl,
              '',
              '### Failed Tests',
              '```',
              failedLines || 'See full output in artifacts.',
              '```',
              '',
              '### Full Output',
              'Download the `nightly-test-results` artifact from the workflow run for complete details.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly integration tests failed — ' + today,
              body,
              labels: ['bug', 'ci-nightly'],
            });

      - name: Fail workflow if tests failed
        if: steps.integration.outcome == 'failure'
        run: exit 1
