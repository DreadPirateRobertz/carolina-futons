name: CI

# Triggers: push/PR to main, plus nightly integration run
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # Nightly at 6am UTC (full integration suite)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Unit Tests ───────────────────────────────────────────────────────────────
  # Runs Vitest across Node 20 + 22 matrix. On Node 20: also collects coverage
  # and uploads to Codecov. Codecov bot posts PR comments automatically.
  # Coverage thresholds: lines 70%, branches 60%, functions 70%.
  # Secret required: CODECOV_TOKEN (optional — fail_ci_if_error: false)
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        if: matrix.node-version == 20
        run: npx vitest run --coverage

      - name: Upload coverage to Codecov
        if: matrix.node-version == 20
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: unit
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Lint ─────────────────────────────────────────────────────────────────────
  # ESLint on Node 20. Runs in parallel with test job. Fails fast on lint errors.
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Lint
        run: npm run lint

  # ── Nightly Integration ──────────────────────────────────────────────────────
  # Full test suite with verbose + JUnit output + coverage in a single run.
  # On failure: auto-opens a GitHub issue tagged [bug, ci-nightly] with the
  # first 30 failed test lines + run URL.
  # Uploads test-results/ artifact (retained 30 days). Coverage sent to Codecov
  # with flag=nightly. Requires: CODECOV_TOKEN secret, issues: write permission.
  nightly-integration:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run full integration test suite with coverage
        id: integration
        run: |
          mkdir -p test-results
          npx vitest run --coverage --reporter=verbose --reporter=junit \
            --outputFile.junit=test-results/junit.xml 2>&1 | tee test-results/full-output.txt
        continue-on-error: true

      - name: Upload nightly coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          flags: nightly
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-results
          path: test-results/
          retention-days: 30

      - name: Check for failures and create issue
        if: steps.integration.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let output = '';
            try {
              output = fs.readFileSync('test-results/full-output.txt', 'utf8');
            } catch (e) {
              output = 'Could not read test output.';
            }

            const failedLines = output.split('\n')
              .filter(l => l.includes('FAIL') || l.includes('×'))
              .slice(0, 30)
              .join('\n');

            const runUrl = [
              process.env.GITHUB_SERVER_URL,
              process.env.GITHUB_REPOSITORY,
              'actions/runs',
              process.env.GITHUB_RUN_ID,
            ].join('/');

            const today = new Date().toISOString().split('T')[0];

            const body = [
              '## Nightly Integration Test Failure',
              '',
              '**Date:** ' + today,
              '**Run:** ' + runUrl,
              '',
              '### Failed Tests',
              '```',
              failedLines || 'See full output in artifacts.',
              '```',
              '',
              '### Full Output',
              'Download the `nightly-test-results` artifact from the workflow run for complete details.',
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Nightly integration tests failed — ' + today,
              body,
              labels: ['bug', 'ci-nightly'],
            });

      - name: Fail workflow if tests failed
        if: steps.integration.outcome == 'failure'
        run: exit 1
